<header>
  <div class="logo">🎬 Movie Shop Pro</div>

  <nav>
    <a href="#movies">Movies</a>
    <a href="#music">Music</a>
    <a href="#sports">Sports</a>
    <a href="#news">News</a>
    <a href="#upload">Upload</a>
    <a href="#comments">Comments</a>
    <a href="#profile">Profile</a>
  </nav>

  <input type="search" id="search" placeholder="Search...">
</header>

<section id="upload">
  <h2>Upload From Your Phone</h2>

  <input type="text" id="movieTitle" placeholder="Movie Title">

  <input
    type="file"
    id="movieFile"
    accept="video/*"
  >

  <button onclick="uploadMovie()">
    Upload Movie
  </button>

  <div id="uploadStatus"></div>
</section>

<section id="movies">
  <h2>Movies</h2>
  <div id="movieContainer"></div>
</section>

<script>
let uploadedMovies = [];

function uploadMovie() {
    const title =
      document.getElementById("movieTitle").value;

    const file =
      document.getElementById("movieFile").files[0];

    if (!title || !file) {
        alert("Choose a movie and enter a title.");
        return;
    }

    const url = URL.createObjectURL(file);

    uploadedMovies.push({
        title: title,
        url: url
    });

    displayMovies();

    document.getElementById("uploadStatus")
      .innerHTML =
      "✅ Movie uploaded successfully!";
}

function displayMovies() {

    const container =
      document.getElementById("movieContainer");

    container.innerHTML = "";

    uploadedMovies.forEach(movie => {

        container.innerHTML += `
            <div class="card">
                <h3>${movie.title}</h3>

                <video width="300"
                       controls
                       src="${movie.url}">
                </video>
            </div>
        `;
    });
}
</script>
