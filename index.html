<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movie Shop</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0d0d0d;
  color:white;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
  background:linear-gradient(145deg,#111,#222);
  box-shadow:0 5px 15px black;
  position:sticky;
  top:0;
}

.logo{
  font-size:22px;
  font-weight:bold;
  text-shadow:2px 2px 5px red;
}

/* BUTTONS */
button{
  padding:8px 10px;
  border:none;
  cursor:pointer;
  border-radius:5px;
  margin:2px;
}

.btn{
  background:red;
  color:white;
}

/* SEARCH */
#search{
  padding:8px;
  border-radius:5px;
  border:none;
}

/* HERO */
.hero{
  text-align:center;
  padding:40px;
  background:linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.7)),
  url('https://via.placeholder.com/1200x400');
}

/* MOVIES */
.movies{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:15px;
  padding:20px;
}

.card{
  background:#1a1a1a;
  padding:10px;
  border-radius:10px;
  text-align:center;
  transition:0.3s;
}

.card:hover{
  transform:scale(1.08);
}

.card img{
  width:100%;
  border-radius:10px;
}

/* MODAL VIDEO */
#videoModal{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.9);
  justify-content:center;
  align-items:center;
}

#videoModal video{
  width:80%;
}

/* LOGIN PANEL */
#loginBox, #adminBox{
  display:none;
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#222;
  padding:20px;
  border-radius:10px;
}

/* FOOTER */
footer{
  text-align:center;
  padding:15px;
  background:#111;
  margin-top:20px;
}
</style>
</head>

<body>

<header>
  <div class="logo">🎬 Movie Shop</div>

  <input id="search" placeholder="Search movies...">

  <div>
    <button class="btn" onclick="openLogin()">Login</button>
    <button class="btn" onclick="openAdmin()">Admin</button>
  </div>
</header>

<section class="hero">
  <h1>Welcome to Movie Shop</h1>
  <p>Watch & Upload Movies Like Agasobanuyenow</p>
</section>

<section class="movies" id="movieList"></section>

<footer>
  © 2026 Movie Shop | Designed by <b>Hirwa Paccy</b>
</footer>

<!-- VIDEO PLAYER -->
<div id="videoModal" onclick="closeVideo()">
  <video id="videoPlayer" controls></video>
</div>

<!-- LOGIN -->
<div id="loginBox">
  <h3>Login</h3>
  <input id="user" placeholder="Username"><br><br>
  <input id="pass" type="password" placeholder="Password"><br><br>
  <button onclick="login()">Enter</button>
</div>

<!-- ADMIN -->
<div id="adminBox">
  <h3>Add Movie</h3>
  <input id="title" placeholder="Movie title"><br><br>
  <input id="img" placeholder="Image URL"><br><br>
  <input id="video" placeholder="Video URL"><br><br>
  <button onclick="addMovie()">Add</button>
</div>

<script>
let movies = JSON.parse(localStorage.getItem("movies")) || [];

/* default movies */
if(movies.length === 0){
  movies = [
    {title:"Action Movie", img:"https://via.placeholder.com/200x300", video:"https://www.w3schools.com/html/mov_bbb.mp4"},
    {title:"Drama Movie", img:"https://via.placeholder.com/200x300", video:"https://www.w3schools.com/html/movie.mp4"}
  ];
  localStorage.setItem("movies", JSON.stringify(movies));
}

function showMovies(){
  let box = document.getElementById("movieList");
  box.innerHTML = "";

  movies.forEach((m,i)=>{
    box.innerHTML += `
      <div class="card">
        <img src="${m.img}">
        <h3>${m.title}</h3>
        <button class="btn" onclick="watch(${i})">Watch Now</button>
      </div>
    `;
  });
}
showMovies();

/* SEARCH */
document.getElementById("search").addEventListener("keyup",function(){
  let v = this.value.toLowerCase();
  document.querySelectorAll(".card").forEach(c=>{
    c.style.display = c.innerText.toLowerCase().includes(v) ? "block":"none";
  });
});

/* VIDEO */
function watch(i){
  let modal = document.getElementById("videoModal");
  let player = document.getElementById("videoPlayer");
  player.src = movies[i].video;
  modal.style.display = "flex";
}

function closeVideo(){
  document.getElementById("videoModal").style.display="none";
}

/* LOGIN */
function openLogin(){
  document.getElementById("loginBox").style.display="block";
}

function login(){
  let u = document.getElementById("user").value;
  let p = document.getElementById("pass").value;

  if(u && p){
    alert("Login successful");
    document.getElementById("loginBox").style.display="none";
  }
}

/* ADMIN */
function openAdmin(){
  document.getElementById("adminBox").style.display="block";
}

function addMovie(){
  let t = document.getElementById("title").value;
  let i = document.getElementById("img").value;
  let v = document.getElementById("video").value;

  movies.push({title:t,img:i,video:v});
  localStorage.setItem("movies", JSON.stringify(movies));

  showMovies();
  document.getElementById("adminBox").style.display="none";
  alert("Movie added!");
}
</script>

</body>
</html>
