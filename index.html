<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movie Shop Pro</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0b0b;
  color:white;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
  background:#111;
  position:sticky;
  top:0;
}

.logo{
  font-size:22px;
  font-weight:bold;
  color:red;
}

/* BUTTONS */
button{
  background:red;
  color:white;
  border:none;
  padding:8px 10px;
  margin:3px;
  cursor:pointer;
  border-radius:5px;
}

/* SEARCH */
#search{
  padding:8px;
  border-radius:5px;
  border:none;
}

/* HERO */
.hero{
  text-align:center;
  padding:30px;
  background:linear-gradient(rgba(0,0,0,0.8),rgba(0,0,0,0.8)),
  url('https://via.placeholder.com/1200x400');
}

/* CATEGORIES */
.categories{
  display:flex;
  justify-content:center;
  gap:10px;
  margin:15px;
  flex-wrap:wrap;
}

.cat{
  background:#222;
  padding:10px;
  border-radius:5px;
  cursor:pointer;
}

.cat.active{
  background:red;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:15px;
  padding:20px;
}

.card{
  background:#1a1a1a;
  padding:10px;
  border-radius:10px;
  text-align:center;
  transition:0.3s;
}

.card:hover{
  transform:scale(1.05);
}

.card img{
  width:100%;
  border-radius:10px;
}

/* MODAL PLAYER */
#player{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:black;
  z-index:999;
}

iframe{
  width:100%;
  height:100%;
}

/* LOGIN / ADMIN */
.box{
  display:none;
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#222;
  padding:20px;
  border-radius:10px;
}

/* FOOTER */
footer{
  text-align:center;
  padding:15px;
  background:#111;
}
</style>
</head>

<body>

<header>
  <div class="logo">🎬 Movie Shop Pro</div>
  <input id="search" placeholder="Search movies...">
  <div>
    <button onclick="openLogin()">Login</button>
    <button onclick="openAdmin()">Admin</button>
  </div>
</header>

<div class="hero">
  <h1>Welcome to Movie Shop Pro</h1>
  <p>Netflix-style Movie & Music Platform</p>
</div>

<!-- CATEGORIES -->
<div class="categories">
  <div class="cat active" onclick="setCat('all')">All</div>
  <div class="cat" onclick="setCat('movies')">Movies</div>
  <div class="cat" onclick="setCat('music')">Music</div>
  <div class="cat" onclick="setCat('action')">Action</div>
  <div class="cat" onclick="setCat('drama')">Drama</div>
</div>

<!-- CONTENT -->
<div class="grid" id="grid"></div>

<footer>
© 2026 Movie Shop Pro | Designed by Hirwa Paccy
</footer>

<!-- PLAYER -->
<div id="player" onclick="closePlayer()">
  <iframe id="frame"></iframe>
</div>

<!-- LOGIN -->
<div class="box" id="loginBox">
  <h3>Login</h3>
  <input id="u" placeholder="Username"><br><br>
  <input id="p" type="password" placeholder="Password"><br><br>
  <button onclick="login()">Enter</button>
</div>

<!-- ADMIN -->
<div class="box" id="adminBox">
  <h3>Add Content</h3>
  <input id="t" placeholder="Title"><br><br>
  <input id="i" placeholder="Image URL"><br><br>
  <input id="l" placeholder="YouTube Embed URL"><br><br>
  <select id="c">
    <option value="movies">Movies</option>
    <option value="music">Music</option>
    <option value="action">Action</option>
    <option value="drama">Drama</option>
  </select><br><br>
  <button onclick="add()">Add</button>
</div>

<script>

/* DEFAULT DATA (LEGAL CONTENT) */
let data = JSON.parse(localStorage.getItem("data")) || [
  {title:"Action Trailer",img:"https://img.youtube.com/vi/2LqzF5WauAw/0.jpg",link:"https://www.youtube.com/embed/2LqzF5WauAw",cat:"action"},
  {title:"Drama Film",img:"https://img.youtube.com/vi/3Zl9puhwiyw/0.jpg",link:"https://www.youtube.com/embed/3Zl9puhwiyw",cat:"drama"},
  {title:"Music One",img:"https://img.youtube.com/vi/kJQP7kiw5Fk/0.jpg",link:"https://www.youtube.com/embed/kJQP7kiw5Fk",cat:"music"}
];

let currentCat = "all";

/* SHOW */
function show(){
  let g = document.getElementById("grid");
  g.innerHTML="";

  let filtered = data.filter(d=>{
    return currentCat==="all" || d.cat===currentCat;
  });

  filtered.forEach((d,i)=>{
    g.innerHTML += `
      <div class="card">
        <img src="${d.img}">
        <h3>${d.title}</h3>
        <button onclick="play('${d.link}')">Watch</button>
      </div>
    `;
  });
}
show();

/* CATEGORY */
function setCat(c){
  currentCat = c;
  document.querySelectorAll(".cat").forEach(x=>x.classList.remove("active"));
  event.target.classList.add("active");
  show();
}

/* SEARCH */
document.getElementById("search").addEventListener("keyup",function(){
  let v=this.value.toLowerCase();
  document.querySelectorAll(".card").forEach(c=>{
    c.style.display=c.innerText.toLowerCase().includes(v)?"block":"none";
  });
});

/* PLAYER */
function play(link){
  document.getElementById("player").style.display="block";
  document.getElementById("frame").src=link;
}
function closePlayer(){
  document.getElementById("player").style.display="none";
  document.getElementById("frame").src="";
}

/* LOGIN */
function openLogin(){document.getElementById("loginBox").style.display="block";}
function login(){
  if(document.getElementById("u").value){
    alert("Login success");
    document.getElementById("loginBox").style.display="none";
  }
}

/* ADMIN */
function openAdmin(){document.getElementById("adminBox").style.display="block";}
function add(){
  let obj={
    title:t.value,
    img:i.value,
    link:l.value,
    cat:c.value
  };
  data.push(obj);
  localStorage.setItem("data",JSON.stringify(data));
  show();
  adminBox.style.display="none";
  alert("Added!");
}
</script>

</body>
</html>
