<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Moveshop Web</title>
  <style>
    body { font-family: Arial, sans-serif; margin:0; padding:0; }
    nav { background:#333; padding:10px; }
    nav a { color:white; margin:0 15px; text-decoration:none; cursor:pointer; }
    section { display:none; padding:20px; }
    section.active { display:block; }
    iframe { margin:10px 0; }
  </style>
</head>
<body>

  <!-- Navigation -->
  <nav>
    <a onclick="showSection('movies')">Movies</a>
    <a onclick="showSection('music')">Music</a>
    <a onclick="showSection('news')">News</a>
  </nav>

  <!-- Movies Section -->
  <section id="movies">
    <h2>Trending Movies</h2>
    <!-- Oshakuru -->
    <iframe width="560" height="315" src="https://www.youtube.com/embed/VIDEO_ID_OSHAKURU" frameborder="0" allowfullscreen></iframe>
    <!-- Agasobanuye -->
    <iframe width="560" height="315" src="https://www.youtube.com/embed/VIDEO_ID_AGASOBANUYE" frameborder="0" allowfullscreen></iframe>
    <!-- Movie Box -->
    <iframe width="560" height="315" src="https://www.youtube.com/embed/VIDEO_ID_MOVIEBOX" frameborder="0" allowfullscreen></iframe>
  </section>

  <!-- Music Section -->
  <section id="music">
    <h2>Trending Music</h2>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/VIDEO_ID_RWANDA" frameborder="0" allowfullscreen></iframe>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/VIDEO_ID_TANZANIA" frameborder="0" allowfullscreen></iframe>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/VIDEO_ID_EAC" frameborder="0" allowfullscreen></iframe>
  </section>

  <!-- News Section -->
  <section id="news">
    <h2>Latest News</h2>
    <!-- Igihe -->
    <iframe src="https://igihe.com" width="100%" height="600"></iframe>
    <!-- RBA -->
    <iframe src="https://rba.co.rw" width="100%" height="600"></iframe>
    <!-- The New Times -->
    <iframe src="https://www.newtimes.co.rw" width="100%" height="600"></iframe>
  </section>

  <script>
    function showSection(id) {
      document.querySelectorAll('section').forEach(sec => sec.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }
  </script>

</body>
</html>
