<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movie shop with hirwa paccy - Premium Agasobanuye Media Hub</title>
  <style>
    /* Premium Midnight Cinematic Color Scheme */
    :root {
      --bg-main: #0a0b0e;
      --bg-card: #14161d;
      --bg-nav: #111217;
      --accent-red: #ff3344;
      --accent-gold: #ffc83b;
      --accent-blue: #0077ff;
      --whatsapp-green: #00a884;
      --text-white: #ffffff;
      --text-gray: #949ba4;
    }

    body { 
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif; 
      margin: 0; 
      padding: 0; 
      background-color: var(--bg-main); 
      color: var(--text-white);
      padding-bottom: 90px;
    }

    /* Immersive Header Bar */
    header { 
      background-color: rgba(14, 16, 23, 0.96); 
      padding: 15px; 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      position: sticky;
      top: 0;
      z-index: 1000;
      border-bottom: 1px solid #1f232e;
      backdrop-filter: blur(10px);
    }
    header h1 { 
      margin: 0; 
      font-size: 1.15rem; 
      color: var(--text-white); 
      font-weight: 800; 
      letter-spacing: -0.3px;
    }
    header h1 span {
      color: var(--accent-red);
    }
    .vip-badge { 
      background: linear-gradient(135deg, #fff2cc, var(--accent-gold)); 
      color: #000; 
      padding: 6px 14px; 
      font-weight: 700; 
      border-radius: 4px; 
      font-size: 0.75rem; 
      text-decoration: none;
      box-shadow: 0 4px 12px rgba(255, 200, 59, 0.2);
    }

    /* Advanced Global Filter Engine (Better than AgasobanuyeNow) */
    .filter-dashboard {
      background: var(--bg-card);
      margin: 12px;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #1f232e;
    }
    .search-input-wrapper {
      position: relative;
      margin-bottom: 8px;
    }
    .search-input-wrapper input {
      width: 100%;
      box-sizing: border-box;
      padding: 10px 12px;
      background: #1c1f26;
      border: 1px solid #2d3240;
      color: white;
      border-radius: 4px;
      font-size: 0.85rem;
    }
    .filter-select-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .filter-select-row select {
      background: #1c1f26;
      color: white;
      border: 1px solid #2d3240;
      padding: 8px;
      border-radius: 4px;
      font-size: 0.8rem;
    }

    /* Highly Optimized WhatsApp Conversion Anchor */
    .wa-premium-banner { 
      background: linear-gradient(135deg, #00b386, var(--whatsapp-green)); 
      margin: 12px; 
      padding: 15px; 
      border-radius: 8px; 
      text-align: center; 
      font-size: 0.85rem; 
      font-weight: 700;
      line-height: 1.4;
      box-shadow: 0 4px 15px rgba(0, 168, 132, 0.25);
    }
    .wa-premium-banner p { margin: 0 0 10px 0; }
    .wa-premium-banner a { 
      display: inline-block; 
      background-color: var(--text-white); 
      color: var(--whatsapp-green); 
      padding: 8px 20px; 
      border-radius: 4px; 
      text-decoration: none; 
      font-weight: 800;
      font-size: 0.8rem;
      letter-spacing: 0.3px;
    }

    /* Page Panel States */
    .page-view { display: none; padding: 0 0 20px 0; }
    .page-view.active-page { display: block; }

    h2 { 
      font-size: 1.1rem; 
      margin: 22px 0 12px 15px; 
      font-weight: 700;
      letter-spacing: 0.3px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-right: 15px;
    }
    h2 .row-count { font-size: 0.75rem; color: var(--accent-red); background: rgba(255,51,68,0.1); padding: 2px 6px; border-radius: 10px; }

    /* Horizontal Browsing Track */
    .swipe-row {
      display: flex;
      overflow-x: auto;
      gap: 12px;
      padding: 5px 15px 15px 15px;
      scroll-behavior: smooth;
    }
    .swipe-row::-webkit-scrollbar { display: none; }

    /* Media Poster Blueprint */
    .media-card { 
      flex: 0 0 115px; 
      background-color: var(--bg-card); 
      border-radius: 6px; 
      overflow: hidden; 
      display: flex; 
      flex-direction: column; 
      cursor: pointer;
      border: 1px solid #1f232e;
    }
    .thumbnail-box { 
      width: 100%; 
      aspect-ratio: 2/3; 
      background: #1c1f26 center/cover; 
      position: relative; 
    }
    .quality-tag {
      position: absolute;
      top: 5px;
      left: 5px;
      background: var(--accent-red);
      padding: 2px 6px;
      font-size: 0.6rem;
      font-weight: 800;
      border-radius: 2px;
    }
    .info-box { padding: 8px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
    .card-title { 
      font-size: 0.8rem;
      font-weight: 700; 
      margin: 0 0 4px 0;
      white-space: nowrap; 
      overflow: hidden; 
      text-overflow: ellipsis; 
    }
    .card-subtitle { font-size: 0.7rem; color: var(--text-gray); margin-bottom: 5px; }
    .card-interpreter { color: var(--accent-gold); font-size: 0.7rem; font-weight: 700; }

    /* Vertical Discovery Configurations */
    .vertical-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
      gap: 12px;
      padding: 15px;
    }

    /* Embedded Theater Stage */
    .player-panel { background-color: #000; padding: 10px; text-align: center; }
    .btn-row { display: flex; gap: 10px; padding: 15px; }
    .action-btn { flex: 1; padding: 14px; border-radius: 4px; border: none; font-weight: 700; cursor: pointer; font-size: 0.85rem; }
    .action-btn.download { background-color: var(--accent-red); color: white; }
    .action-btn.back { background-color: #232630; color: white; }

    /* Info Lists (Sports, Music, News) Layout */
    .list-item-strip {
      background-color: var(--bg-card);
      padding: 16px;
      margin: 8px 15px;
      border-radius: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      text-decoration: none;
      color: white;
      font-weight: 600;
      font-size: 0.85rem;
      border: 1px solid #1f232e;
    }
    .list-item-strip span.sub-lbl { font-size: 0.75rem; color: var(--text-gray); font-weight: 400; }

    /* Fixed Bottom Application Command Bar (All Menus Included) */
    nav.bottom-app-bar { 
      position: fixed; 
      bottom: 0; 
      left: 0; 
      right: 0; 
      background-color: var(--bg-nav); 
      display: flex; 
      justify-content: space-around; 
      padding: 12px 0 14px 0; 
      border-top: 1px solid #1f232e; 
      z-index: 2000; 
    }
    .tab-item { 
      background: none; 
      border: none; 
      color: #626978; 
      font-size: 0.62rem; 
      cursor: pointer; 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      gap: 5px;
      width: 15%;
      font-weight: 600;
    }
    .tab-item.active-tab { color: var(--text-white); }
    .tab-item svg { width: 20px; height: 20px; fill: currentColor; }
    .tab-item.active-tab svg { fill: var(--accent-red); }
  </style>
</head>
